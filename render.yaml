# Render Blueprint for TailorCV.ai
# This file allows one-click deployment on Render

services:
  - type: web
    name: tailorcv
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
