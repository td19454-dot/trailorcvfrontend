<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Inter, sans-serif; background: #f9fafb; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        .test-section { background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
        .test-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
        
        .btn { 
            padding: 0.75rem 1.5rem; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: 600;
        }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; }
        
        /* Modal Styles - Copy from main CSS */
        .template-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .template-modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .template-modal-content {
            background: white;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: modalSlideIn 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .template-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .template-modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            margin: 0;
        }

        .template-modal-close {
            background: none;
            border: none;
            font-size: 1.75rem;
            color: #6b7280;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .template-modal-close:hover { color: #1f2937; }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .template-option {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .template-option:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .template-option.selected {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .template-option-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .template-option-name { font-weight: 600; color: #1f2937; margin-bottom: 0.25rem; font-size: 0.9rem; }
        .template-option-style { font-size: 0.8rem; color: #6b7280; }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .console { background: #1f2937; color: #10b981; padding: 1rem; border-radius: 6px; font-family: monospace; font-size: 0.85rem; max-height: 200px; overflow-y: auto; }
        .console-line { margin: 0.25rem 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="test-section">
            <div class="test-title">Modal Test</div>
            <button class="btn btn-primary" onclick="testShowModal()">Show Modal</button>
        </div>

        <!-- Modal -->
        <div id="template-modal" class="template-modal" style="display: none;">
            <div class="template-modal-backdrop"></div>
            <div class="template-modal-content">
                <div class="template-modal-header">
                    <h2 class="template-modal-title">Choose Resume Template</h2>
                    <button class="template-modal-close" onclick="testCloseModal()">×</button>
                </div>
                <p style="margin-bottom: 1.5rem; color: #6b7280;">
                    Select a template (templates will be generated here)
                </p>
                <div class="template-grid" id="test-grid">
                    <!-- Will be populated by JS -->
                </div>
                <div style="text-align: center; margin-top: 2rem;">
                    <button class="btn btn-primary" onclick="testProceed()" id="proceed-btn" style="display: none;">Proceed</button>
                </div>
            </div>
        </div>

        <!-- Console Output -->
        <div class="test-section">
            <div class="test-title">Console Output</div>
            <div class="console" id="console"></div>
        </div>
    </div>

    <script>
        let selectedTemplate = null;
        const templates = [
            { id: 1, name: 'Template 1', icon: '📄' },
            { id: 2, name: 'Template 2', icon: '📋' },
            { id: 3, name: 'Template 3', icon: '📑' }
        ];
        const styles = [
            { id: 1, name: 'Modern' },
            { id: 2, name: 'Professional' },
            { id: 3, name: 'Clean' }
        ];

        function log(msg) {
            console.log(msg);
            const consoleEl = document.getElementById('console');
            const line = document.createElement('div');
            line.className = 'console-line';
            line.textContent = msg;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function testShowModal() {
            log('[TEST] testShowModal() called');
            const modal = document.getElementById('template-modal');
            log('[TEST] Modal found: ' + !!modal);
            
            if (!modal) {
                log('[ERROR] Modal not found!');
                return;
            }

            const gridContainer = modal.querySelector('.template-grid');
            log('[TEST] Grid container found: ' + !!gridContainer);
            
            if (!gridContainer) {
                log('[ERROR] Grid container not found!');
                return;
            }

            // Generate templates
            gridContainer.innerHTML = '';
            let count = 0;
            templates.forEach(template => {
                styles.forEach(style => {
                    const card = document.createElement('div');
                    card.className = 'template-option';
                    card.innerHTML = `
                        <div class="template-option-icon">${template.icon}</div>
                        <div class="template-option-name">${template.name}</div>
                        <div class="template-option-style">${style.name} Style</div>
                    `;
                    card.addEventListener('click', () => {
                        document.querySelectorAll('.template-option').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                        selectedTemplate = { id: template.id, style: style.id };
                        log('[TEST] Selected: Template ' + template.id + ' + Style ' + style.id);
                        document.getElementById('proceed-btn').style.display = 'block';
                    });
                    gridContainer.appendChild(card);
                    count++;
                });
            });

            log('[TEST] Created ' + count + ' template cards');
            modal.style.display = 'block';
            log('[TEST] Modal display set to: ' + modal.style.display);
        }

        function testCloseModal() {
            log('[TEST] testCloseModal() called');
            document.getElementById('template-modal').style.display = 'none';
        }

        function testProceed() {
            log('[TEST] testProceed() called');
            log('[TEST] Selected: ' + JSON.stringify(selectedTemplate));
            testCloseModal();
        }

        log('[TEST] Test page loaded');
    </script>
</body>
</html>
